; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Common settings shared by both environments
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	adafruit/Adafruit SSD1306
	adafruit/Adafruit GFX Library
	knolleary/PubSubClient
extra_scripts = 
	pre:discover_ota.py

; USB Upload via COM3
[env:esp32dev-usb]
upload_port = COM3
monitor_port = COM3

; OTA Upload - Auto-discovers all devices on network (like Arduino IDE)
[env:esp32dev-ota]
upload_protocol = espota
; upload_port left blank - discovery script will find devices
; optional: set exact hostname if multiple OTA devices exist
; custom_ota_device_name = 43M00_New_Gate
upload_flags = 
	--auth=
	--port=3232

; OTA Upload - Option 2: Specific IP (create one environment per device)
